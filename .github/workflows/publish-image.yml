name: Publish r2-code-review image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-image.yml"
      - ".opencode/**"
      - "docker/**"
      - "jenkins-deploy-gate-demo/**"
      - "scripts/**"
      - "templates/**"
      - "opencode.json"
      - ".dockerignore"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASENAME: r2-code-review

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image name
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_NAME=${owner}/${IMAGE_BASENAME}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: |
            r2-code-review:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/r2-code-review.tar
          cache-from: type=gha

      - name: Compress image tar
        shell: bash
        run: gzip -9 /tmp/r2-code-review.tar

      - name: Upload image tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: r2-code-review-image
          path: /tmp/r2-code-review.tar.gz
          retention-days: 7
